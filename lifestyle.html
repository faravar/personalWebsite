<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چرخ زندگی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jalaali-js@1.2.6/dist/jalaali.min.js"></script>
<style>
  :root{
    --cream:#FAF6EE;
    --card:#FFFFFF;
    --ink:#2F3A2E;
    --muted:#7A8072;
    --line:#E7E1D2;
    --low:#C97B5E;
    --mid:#D9A548;
    --high:#7C9473;
    --high-deep:#5D7A56;
    --ghost:#B4A896;
    --shadow: 0 10px 30px -12px rgba(47,58,46,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Vazirmatn', sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:960px;
    margin:0 auto;
    padding:28px 18px 60px;
  }
  header.top{
    text-align:center;
    margin-bottom:22px;
  }
  header.top h1{
    font-size:1.9rem;
    font-weight:800;
    margin:0 0 6px;
    letter-spacing:0;
  }
  header.top p{
    color:var(--muted);
    font-size:.95rem;
    margin:0;
  }
  .layout{
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap:22px;
    align-items:start;
  }
  @media (max-width:800px){
    .layout{grid-template-columns:1fr;}
  }
  .card{
    background:var(--card);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:20px;
  }
  .wheel-card{
    text-align:center;
    position:relative;
  }
  .wheel-card .avg{
    position:absolute;
    top:18px;
    right:20px;
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:14px;
    padding:6px 14px;
    font-size:.8rem;
    color:var(--muted);
  }
  .wheel-card .avg b{
    color:var(--ink);
    font-size:1.05rem;
  }
  svg#wheel{
    width:100%;
    max-width:440px;
    height:auto;
  }
  .legend{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-top:6px;
    font-size:.78rem;
    color:var(--muted);
    flex-wrap:wrap;
  }
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .insight{
    margin-top:16px;
    background:linear-gradient(135deg, #F3EEE0, #FBF8F1);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 16px;
    font-size:.88rem;
    color:var(--ink);
    text-align:right;
    line-height:1.9;
  }
  .sliders{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .slider-row{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .slider-row .top-line{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:.9rem;
  }
  .slider-row .top-line .val{
    font-weight:700;
    min-width:26px;
    text-align:left;
    color:var(--high-deep);
  }
  input[type=range]{
    -webkit-appearance:none;
    width:100%;
    height:8px;
    border-radius:5px;
    background:var(--line);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:20px;height:20px;
    border-radius:50%;
    background:var(--high);
    border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:20px;height:20px;
    border-radius:50%;
    background:var(--high);
    border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
  }
  .actions{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  button{
    font-family:inherit;
    border:none;
    border-radius:12px;
    padding:12px 16px;
    font-size:.92rem;
    font-weight:600;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  button:active{transform:scale(.97);}
  .btn-primary{
    background:var(--high-deep);
    color:#fff;
    flex:1;
  }
  .btn-ghost{
    background:var(--cream);
    color:var(--ink);
    border:1px solid var(--line);
  }
  .history-card h2{
    font-size:1.05rem;
    margin:0 0 4px;
  }
  .history-card p.hint{
    color:var(--muted);
    font-size:.82rem;
    margin:0 0 14px;
  }
  .history-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:380px;
    overflow-y:auto;
  }
  .hist-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .hist-item:hover{background:var(--cream);}
  .hist-item.active{
    border-color:var(--ghost);
    background:#F5F0E6;
  }
  .hist-item .date{
    font-size:.85rem;
    font-weight:600;
  }
  .hist-item .avg-badge{
    font-size:.78rem;
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:10px;
    padding:2px 8px;
    color:var(--muted);
  }
  .hist-item .del{
    color:var(--low);
    font-size:.78rem;
    background:none;
    border:none;
    padding:2px 6px;
    cursor:pointer;
  }
  .empty-hist{
    color:var(--muted);
    font-size:.85rem;
    text-align:center;
    padding:20px 0;
  }
  
  /* toast */
  #toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    padding:10px 20px;
    border-radius:12px;
    font-size:.85rem;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:50;
  }
  #toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .site-footer {
    text-align: center;
    padding: 20px;
    margin-top: auto; /* اگر مایلید همیشه پایین صفحه بماند */
    font-size: 0.9rem;
    color: var(--text-dim, #a79fbb); /* استفاده از متغیر متنی که در کدها دارید */
}

.site-footer a {
    color: var(--high); /* یا هر رنگ شاخصی مثل گلد یا تال که در متغیرها تعریف کردید */
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s ease;
}

.site-footer a:hover {
    color: var(--high-deep); /* تغییر رنگ هنگام هاور */
    text-decoration: underline;
    text-decoration: none;
}
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <h1>🌿 چرخ زندگی</h1>
    <p>یک نگاه صادقانه به تعادل زندگی‌ت — امروز چقدر هر حوزه رشد کرده؟</p>
  </header>

  <div class="layout">

    <div class="card wheel-card">
      <div class="avg">میانگین <b id="avgVal">۰</b></div>
      <svg id="wheel" viewBox="0 0 500 500"></svg>
      <div class="legend">
        <span><i class="dot" style="background:var(--high)"></i> امتیاز فعلی</span>
        <span id="ghostLegend" style="display:none;"><i class="dot" style="background:var(--ghost)"></i> نسخه‌ی مقایسه</span>
      </div>
      <div class="insight" id="insightBox"></div>
    </div>

    <div class="card">
      <div class="sliders" id="slidersHost"></div>
      <div class="actions">
        <button class="btn-primary" id="saveBtn">ثبت امتیاز امروز</button>
        <button class="btn-ghost" id="resetBtn">پاک‌کردن</button>
      </div>
    </div>

  </div>

  <div class="card history-card" style="margin-top:22px;">
    <h2>تاریخچه</h2>
    <p class="hint">روی هر مورد بزن تا با امتیاز فعلی مقایسه بشه.</p>
    <div class="history-list" id="historyList"></div>
  </div>

  <footer class="site-footer">
    <p> <a href="https://www.karimzaadeh.ir" target="_blank" rel="noopener noreferrer">فرهاد کریم‌زاده | Farhad Karimzadeh</a></p>
</footer>
</div>

<div id="toast"></div>

<script>
// ---------- domains ----------
const DOMAINS = [
  { key:'health',   label:'سلامت جسمی' },
  { key:'mind',     label:'آرامش روان' },
  { key:'money',    label:'مالی' },
  { key:'career',   label:'شغل و کار' },
  { key:'love',     label:'روابط عاطفی' },
  { key:'family',   label:'خانواده و دوستان' },
  { key:'growth',   label:'رشد فردی' },
  { key:'fun',      label:'اوقات فراغت' },
];

const STORAGE_KEY = 'wheel-of-life-history-v1';
const PERSIAN_MONTHS = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];

let scores = {};
DOMAINS.forEach(d => scores[d.key] = 5);

let compareEntry = null; // history item currently overlaid

// ---------- persistence ----------
function loadHistory(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveHistory(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function jalaliDateString(ts){
  const d = new Date(ts);
  const j = jalaali.toJalaali(d.getFullYear(), d.getMonth()+1, d.getDate());
  return `${j.jd} ${PERSIAN_MONTHS[j.jm-1]} ${j.jy}`;
}

// ---------- color mapping (botanical: dry -> lush) ----------
function colorForScore(v){
  // v: 0-10
  if(v <= 3){
    const t = v/3;
    return lerpColor('#C97B5E', '#D9A548', t);
  } else if (v <= 6){
    const t = (v-3)/3;
    return lerpColor('#D9A548', '#7C9473', t);
  } else {
    const t = (v-6)/4;
    return lerpColor('#7C9473', '#5D7A56', t);
  }
}
function lerpColor(a,b,t){
  const ah = hexToRgb(a), bh = hexToRgb(b);
  const r = Math.round(ah.r + (bh.r-ah.r)*t);
  const g = Math.round(ah.g + (bh.g-ah.g)*t);
  const bl = Math.round(ah.b + (bh.b-ah.b)*t);
  return `rgb(${r},${g},${bl})`;
}
function hexToRgb(hex){
  const n = parseInt(hex.slice(1),16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}

// ---------- geometry ----------
const CX=250, CY=250, R=190;
function pointFor(index, value /*0-10*/){
  const angle = (-90 + index * (360/DOMAINS.length)) * Math.PI/180;
  const radius = (value/10) * R;
  return { x: CX + radius*Math.cos(angle), y: CY + radius*Math.sin(angle) };
}
function labelPoint(index){
  const angle = (-90 + index * (360/DOMAINS.length)) * Math.PI/180;
  const radius = R + 34;
  return { x: CX + radius*Math.cos(angle), y: CY + radius*Math.sin(angle) };
}

function polygonPoints(scoreMap){
  return DOMAINS.map((d,i)=>{
    const p = pointFor(i, scoreMap[d.key] ?? 0);
    return `${p.x},${p.y}`;
  }).join(' ');
}

// ---------- render wheel ----------
function renderWheel(){
  const svg = document.getElementById('wheel');
  let markup = '';

  // rings
  [2,4,6,8,10].forEach(v=>{
    const r = (v/10)*R;
    markup += `<circle cx="${CX}" cy="${CY}" r="${r}" fill="none" stroke="#E7E1D2" stroke-width="1"/>`;
  });

  // spokes + labels
  DOMAINS.forEach((d,i)=>{
    const outer = pointFor(i,10);
    markup += `<line x1="${CX}" y1="${CY}" x2="${outer.x}" y2="${outer.y}" stroke="#E7E1D2" stroke-width="1"/>`;
  });

  // ghost (comparison) polygon
  if(compareEntry){
    markup += `<polygon points="${polygonPoints(compareEntry.scores)}" fill="none" stroke="#B4A896" stroke-width="2.5" stroke-dasharray="6 5" stroke-linejoin="round"/>`;
  }

  // current polygon with radial-ish fill based on average color
  const avg = average(scores);
  const fillColor = colorForScore(avg);
  markup += `
    <defs>
      <radialGradient id="wheelFill" cx="50%" cy="50%" r="65%">
        <stop offset="0%" stop-color="${fillColor}" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="${fillColor}" stop-opacity="0.55"/>
      </radialGradient>
    </defs>
    <polygon points="${polygonPoints(scores)}" fill="url(#wheelFill)" stroke="${fillColor}" stroke-width="2.5" stroke-linejoin="round"/>
  `;

  // per-domain dots colored individually (growth-ring feel)
  DOMAINS.forEach((d,i)=>{
    const p = pointFor(i, scores[d.key]);
    markup += `<circle cx="${p.x}" cy="${p.y}" r="6" fill="${colorForScore(scores[d.key])}" stroke="#fff" stroke-width="2"/>`;
  });

  // center dot
  markup += `<circle cx="${CX}" cy="${CY}" r="4" fill="#7A8072"/>`;

  // labels
  DOMAINS.forEach((d,i)=>{
    const p = labelPoint(i);
    let anchor = 'middle';
    if(p.x > CX + 20) anchor = 'start';
    else if(p.x < CX - 20) anchor = 'end';
    markup += `
      <text x="${p.x}" y="${p.y-6}" text-anchor="${anchor}" font-size="13" font-family="Vazirmatn, sans-serif" fill="#2F3A2E" font-weight="600">${d.label}</text>
      <text x="${p.x}" y="${p.y+12}" text-anchor="${anchor}" font-size="12" font-family="Vazirmatn, sans-serif" fill="${colorForScore(scores[d.key])}" font-weight="700">${scores[d.key]}</text>
    `;
  });

  svg.innerHTML = markup;
  document.getElementById('avgVal').textContent = toPersianDigits(avg.toFixed(1));
  document.getElementById('ghostLegend').style.display = compareEntry ? 'inline-flex' : 'none';
  renderInsight(avg);
}

function average(scoreMap){
  const vals = DOMAINS.map(d=>scoreMap[d.key] ?? 0);
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}

function renderInsight(avg){
  const box = document.getElementById('insightBox');
  const weakest = DOMAINS.reduce((min,d)=> scores[d.key] < scores[min.key] ? d : min, DOMAINS[0]);
  const strongest = DOMAINS.reduce((max,d)=> scores[d.key] > scores[max.key] ? d : max, DOMAINS[0]);
  let msg = `کم‌رنگ‌ترین حوزه‌ی چرخت «${weakest.label}» است (${toPersianDigits(scores[weakest.key])} از ۱۰). یک قدم کوچیک همین هفته براش چیه؟`;
  if(compareEntry){
    const diff = (average(scores) - average(compareEntry.scores)).toFixed(1);
    const sign = diff > 0 ? '+' : '';
    msg += `<br>نسبت به ${compareEntry.dateLabel}: ${sign}${toPersianDigits(diff)} تغییر میانگین.`;
  }
  box.innerHTML = msg;
}

function toPersianDigits(input){
  const map = {'0':'۰','1':'۱','2':'۲','3':'۳','4':'۴','5':'۵','6':'۶','7':'۷','8':'۸','9':'۹','-':'−','.':'.'};
  return String(input).split('').map(ch => map[ch] ?? ch).join('');
}

// ---------- sliders ----------
function renderSliders(){
  const host = document.getElementById('slidersHost');
  host.innerHTML = DOMAINS.map(d => `
    <div class="slider-row">
      <div class="top-line">
        <span>${d.label}</span>
        <span class="val" id="val-${d.key}">${scores[d.key]}</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="${scores[d.key]}" data-key="${d.key}">
    </div>
  `).join('');

  host.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const key = e.target.dataset.key;
      scores[key] = parseInt(e.target.value,10);
      document.getElementById(`val-${key}`).textContent = toPersianDigits(scores[key]);
      renderWheel();
    });
  });
}

// ---------- history ----------
function renderHistory(){
  const list = loadHistory();
  const host = document.getElementById('historyList');
  if(list.length === 0){
    host.innerHTML = `<div class="empty-hist">هنوز چیزی ثبت نشده. اولین امتیازت رو بزن!</div>`;
    return;
  }
  host.innerHTML = list.slice().reverse().map(entry => {
    const isActive = compareEntry && compareEntry.timestamp === entry.timestamp;
    return `
      <div class="hist-item ${isActive ? 'active':''}" data-ts="${entry.timestamp}">
        <span class="date">${entry.dateLabel}</span>
        <span class="avg-badge">میانگین ${toPersianDigits(average(entry.scores).toFixed(1))}</span>
        <button class="del" data-del="${entry.timestamp}">حذف</button>
      </div>
    `;
  }).join('');

  host.querySelectorAll('.hist-item').forEach(item=>{
    item.addEventListener('click', e=>{
      if(e.target.dataset.del) return;
      const ts = Number(item.dataset.ts);
      const list = loadHistory();
      const entry = list.find(x=>x.timestamp === ts);
      if(!entry) return;
      compareEntry = (compareEntry && compareEntry.timestamp === ts) ? null : entry;
      renderWheel();
      renderHistory();
    });
  });

  host.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const ts = Number(btn.dataset.del);
      let list = loadHistory().filter(x=>x.timestamp !== ts);
      saveHistory(list);
      if(compareEntry && compareEntry.timestamp === ts) compareEntry = null;
      renderHistory();
      renderWheel();
      showToast('حذف شد.');
    });
  });
}

// ---------- actions ----------
document.getElementById('saveBtn').addEventListener('click', ()=>{
  const ts = Date.now();
  const entry = {
    timestamp: ts,
    dateLabel: jalaliDateString(ts),
    scores: { ...scores }
  };
  const list = loadHistory();
  list.push(entry);
  saveHistory(list);
  renderHistory();
  showToast('ثبت شد ✓');
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  DOMAINS.forEach(d => scores[d.key] = 5);
  compareEntry = null;
  renderSliders();
  renderWheel();
  renderHistory();
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1800);
}

// ---------- init ----------
renderSliders();
renderWheel();
renderHistory();
</script>

</body>
</html>
