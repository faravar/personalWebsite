<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>باغچه من — ردیاب گیاهان خانگی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jalaali-js@1.2.6/dist/jalaali.min.js"></script>
<style>
  :root{
    --paper:#F6F4E9;
    --paper-deep:#EDE9D8;
    --card:#FBFAF3;
    --ink:#2B2A1F;
    --ink-soft:#6b6952;
    --ink-faint:#9a9781;
    --leaf-deep:#2F5233;
    --leaf:#6E9257;
    --leaf-light:#C7D9AE;
    --leaf-pale:#E9EFDD;
    --clay:#B8663B;
    --clay-deep:#8A4B2A;
    --clay-pale:#F0DCC9;
    --water:#4C7C90;
    --water-light:#A9C7D1;
    --water-pale:#E4EEF1;
    --wilt:#C4A24B;
    --danger:#B5473A;
    --line: rgba(43,42,31,0.12);
    --line-strong: rgba(43,42,31,0.22);
    --shadow: 0 1px 2px rgba(43,42,31,0.06), 0 8px 24px -12px rgba(43,42,31,0.18);
    --shadow-lg: 0 4px 8px rgba(43,42,31,0.08), 0 24px 48px -16px rgba(43,42,31,0.28);
    --radius: 20px;
  }
  html {
    position: relative;
    min-height: 100%;
}

body {
    margin: 0;
    margin-bottom: 60px; /* هم‌اندازه با ارتفاع فوتر برای جلوگیری از تداخل محتوا */
}

footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px; /* ارتفاع فوتر خود را اینجا مشخص کنید */
}

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:'Vazirmatn', sans-serif;
    background:
      radial-gradient(1200px 600px at 85% -10%, var(--leaf-pale) 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 10%, var(--water-pale) 0%, transparent 55%),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:64px;
  }

  ::selection{ background:var(--leaf-light); color:var(--leaf-deep); }

  /* ---------- Texture: subtle paper grain via layered gradient noise ---------- */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    opacity:.5;
    background-image: radial-gradient(rgba(43,42,31,0.035) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode:multiply;
    z-index:0;
  }

  .wrap{ position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:0 20px; }

  /* ---------- Header ---------- */
  header.top{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 0 14px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:38px;height:38px; border-radius:11px;
    background:linear-gradient(145deg, var(--leaf), var(--leaf-deep));
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.15), 0 3px 8px rgba(47,82,51,0.35);
  }
  .brand-mark svg{ width:20px; height:20px; }
  .brand h1{
    font-size:20px; font-weight:800; margin:0; letter-spacing:-0.01em;
    color:var(--leaf-deep);
  }
  .brand small{ display:block; font-size:11px; color:var(--ink-faint); font-weight:500; margin-top:1px;}

  .btn{
    border:none; cursor:pointer; font-family:inherit;
    display:inline-flex; align-items:center; gap:7px;
    border-radius:999px; font-weight:700; transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active{ transform:scale(0.96); }
  .btn-add{
    background: linear-gradient(160deg, var(--clay), var(--clay-deep));
    color:#fff; padding:11px 18px; font-size:14px;
    box-shadow: 0 6px 16px -6px rgba(138,75,42,0.55);
  }
  .btn-add:hover{ box-shadow: 0 8px 20px -6px rgba(138,75,42,0.65); }
  .btn-add svg{ width:16px; height:16px; }

  /* ---------- Hero / greenhouse band ---------- */
  .hero{
    position:relative; overflow:hidden;
    border-radius: 24px;
    background: linear-gradient(155deg, #EEF3E4 0%, #E4EEDA 45%, #DCEAE2 100%);
    border:1px solid var(--line);
    padding:26px 26px;
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    box-shadow: var(--shadow);
  }
  .hero::after{
    content:"";
    position:absolute; left:-40px; bottom:-60px; width:220px; height:220px;
    background: radial-gradient(circle, rgba(110,146,87,0.16), transparent 70%);
  }
  .hero-text .eyebrow{
    font-size:11.5px; font-weight:700; color:var(--leaf-deep); letter-spacing:.04em;
    display:flex; align-items:center; gap:6px; margin-bottom:6px;
  }
  .hero-text .eyebrow .dot{ width:6px;height:6px;border-radius:50%; background:var(--leaf); }
  .hero-num{
    font-size:44px; font-weight:900; line-height:1; color:var(--ink);
    letter-spacing:-0.02em;
  }
  .hero-num span{ color:var(--clay); }
  .hero-sub{ font-size:13.5px; color:var(--ink-soft); margin-top:6px; font-weight:500; max-width:340px; }
  .hero-stats{ display:flex; gap:22px; position:relative; z-index:1; }
  .hero-stat{ text-align:center; min-width:64px; }
  .hero-stat b{ display:block; font-size:22px; font-weight:800; color:var(--leaf-deep); }
  .hero-stat span{ font-size:11px; color:var(--ink-faint); font-weight:600; }

  /* ---------- Filters ---------- */
  .filters{
    display:flex; align-items:center; gap:10px; margin:22px 0 18px; flex-wrap:wrap;
  }
  .chip{
    padding:8px 15px; border-radius:999px; font-size:13px; font-weight:600;
    background:var(--card); border:1px solid var(--line); color:var(--ink-soft);
    cursor:pointer; transition:.15s ease; white-space:nowrap;
  }
  .chip:hover{ border-color:var(--line-strong); }
  .chip.active{ background:var(--leaf-deep); color:#fff; border-color:var(--leaf-deep); }
  .search{
    margin-inline-start:auto; position:relative; flex:1; min-width:160px; max-width:260px;
  }
  .search input{
    width:100%; padding:9px 14px 9px 14px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); font-family:inherit; font-size:13px; color:var(--ink); outline:none;
  }
  .search input:focus{ border-color:var(--leaf); }

  /* ---------- Grid ---------- */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(206px,1fr)); gap:16px;
  }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 14px 14px; position:relative; cursor:pointer;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-lg); border-color:var(--line-strong); }

  .ring-wrap{ position:relative; width:112px; height:112px; margin-bottom:8px; }
  .ring-wrap svg{ width:100%; height:100%; }
  .ring-track{ fill:none; stroke:var(--paper-deep); stroke-width:5; }
  .ring-prog{ fill:none; stroke-width:5; stroke-linecap:round; transition: stroke-dashoffset .5s ease, stroke .3s ease; }
  .pot-svg{ position:absolute; inset:0; width:100%; height:100%; }

  .badge{
    position:absolute; top:10px; left:10px; font-size:10px; font-weight:800;
    padding:3px 8px; border-radius:999px; letter-spacing:.02em;
  }
  .badge.fresh{ background:var(--leaf-pale); color:var(--leaf-deep); }
  .badge.ok{ background:var(--water-pale); color:var(--water); }
  .badge.thirsty{ background:#F7ECD3; color:#8a6a1f; }
  .badge.critical{ background:#F5DEDA; color:var(--danger); }

  .card h3{ font-size:15px; font-weight:700; margin:2px 0 1px; }
  .card .species{ font-size:11.5px; color:var(--ink-faint); font-weight:500; margin-bottom:8px; }

  .meta-row{
    font-size:11.5px; color:var(--ink-soft); font-weight:600;
    background:var(--paper-deep); border-radius:10px; padding:6px 10px; width:100%;
    margin-bottom:10px;
  }

  .water-btn{
    width:100%; padding:9px 0; border-radius:12px; font-size:13px;
    background:var(--water); color:#fff; box-shadow:0 5px 14px -6px rgba(76,124,144,0.55);
  }
  .water-btn:disabled{ background:var(--leaf-light); color:var(--leaf-deep); box-shadow:none; cursor:default; }
  .water-btn svg{ width:14px;height:14px; }

  /* ---------- Empty state ---------- */
  .empty{
    text-align:center; padding:60px 20px; border:1.5px dashed var(--line-strong);
    border-radius:24px; background:var(--card);
  }
  .empty h3{ font-size:17px; margin:14px 0 4px; color:var(--leaf-deep); }
  .empty p{ font-size:13.5px; color:var(--ink-soft); margin:0 0 18px; }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(43,42,31,0.42); backdrop-filter:blur(2px);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  @media(min-width:640px){ .overlay{ align-items:center; } }

  .sheet{
    background:var(--paper); width:100%; max-width:480px; max-height:92vh; overflow-y:auto;
    border-radius:26px 26px 0 0; padding:22px 22px 26px;
    transform:translateY(24px); transition:transform .25s ease;
    box-shadow: var(--shadow-lg);
  }
  .overlay.show .sheet{ transform:translateY(0); }
  @media(min-width:640px){ .sheet{ border-radius:26px; } }

  .sheet-handle{ width:38px; height:4px; border-radius:99px; background:var(--line-strong); margin:0 auto 16px; }
  .sheet h2{ font-size:18px; font-weight:800; margin:0 0 16px; color:var(--leaf-deep); }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; }
  .field input[type=text], .field input[type=number], .field select, .field textarea{
    width:100%; padding:11px 13px; border-radius:12px; border:1px solid var(--line-strong);
    background:var(--card); font-family:inherit; font-size:13.5px; color:var(--ink); outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--leaf); }
  .field textarea{ resize:vertical; min-height:60px; }
  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .species-picker{ display:flex; gap:8px; flex-wrap:wrap; }
  .species-opt{
    width:56px; height:56px; border-radius:14px; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; cursor:pointer; background:var(--card);
    transition:.15s ease;
  }
  .species-opt svg{ width:30px; height:30px; }
  .species-opt.active{ border-color:var(--leaf); background:var(--leaf-pale); }

  .photo-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .photo-thumb{ width:52px; height:52px; border-radius:10px; object-fit:cover; border:1px solid var(--line); }
  .photo-add{
    width:52px; height:52px; border-radius:10px; border:1.5px dashed var(--line-strong);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-faint);
  }

  .sheet-actions{ display:flex; gap:10px; margin-top:18px; }
  .btn-primary{
    flex:1; padding:13px 0; border-radius:14px; background:var(--leaf-deep); color:#fff; font-size:14.5px;
    justify-content:center;
  }
  .btn-ghost{
    padding:13px 18px; border-radius:14px; background:var(--card); border:1px solid var(--line-strong);
    color:var(--ink-soft); font-size:14px; justify-content:center;
  }
  .btn-danger-text{
    background:none; border:none; color:var(--danger); font-size:12.5px; font-weight:700; cursor:pointer;
    padding:8px; margin-top:4px; width:100%; text-align:center;
  }

  /* ---------- AI care suggestions ---------- */
  .ai-btn{
    width:100%; justify-content:center; padding:11px 0; border-radius:14px; font-size:13.5px;
    background: linear-gradient(120deg, var(--water-pale), var(--leaf-pale));
    color:var(--leaf-deep); border:1px dashed var(--leaf); margin-bottom:4px;
  }
  .ai-btn:disabled{ opacity:.6; cursor:default; }
  .ai-box{
    border:1px solid var(--line); border-radius:16px; background:var(--card);
    padding:14px; margin-top:10px; font-size:12.5px; color:var(--ink-soft);
  }
  .ai-source{
    font-size:10.5px; font-weight:700; color:var(--leaf-deep); background:var(--leaf-pale);
    display:inline-flex; padding:3px 9px; border-radius:999px; margin-bottom:10px;
  }
  .ai-box .ai-row{ display:flex; gap:8px; margin-bottom:10px; align-items:flex-start; }
  .ai-box .ai-row:last-child{ margin-bottom:0; }
  .ai-box .ai-ico{ width:20px; height:20px; flex-shrink:0; color:var(--leaf); margin-top:1px; }
  .ai-box .ai-label{ font-weight:700; color:var(--ink); display:block; margin-bottom:2px; font-size:12px; }
  .ai-box .ai-val{ line-height:1.7; }
  .ai-box ul{ margin:2px 0 0; padding-inline-start:16px; }
  .ai-box li{ margin-bottom:2px; }
  .ai-apply{
    font-size:11px; font-weight:700; color:var(--water); background:var(--water-pale);
    border:none; border-radius:8px; padding:4px 9px; cursor:pointer; margin-inline-start:6px;
  }
  .ai-error{ padding:12px 14px; font-size:12.5px; color:var(--danger); background:#F5DEDA; border-radius:12px; }
  .ai-refresh{
    display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--ink-faint);
    background:none; border:none; cursor:pointer; margin-top:8px; padding:2px;
  }
  .ai-refresh svg{ width:12px; height:12px; }

  /* ---------- Detail drawer ---------- */
  .detail-hero{
    display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:16px;
  }
  .detail-ring{ width:150px; height:150px; position:relative; margin-bottom:10px;}
  .detail-ring svg{ width:100%; height:100%; }
  .detail-hero h2{ margin:4px 0 2px; font-size:20px; }
  .detail-hero .species{ font-size:12px; color:var(--ink-faint); font-weight:600; }

  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0; }
  .stat-box{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 6px; text-align:center; }
  .stat-box b{ display:block; font-size:16px; font-weight:800; color:var(--leaf-deep); }
  .stat-box span{ font-size:10.5px; color:var(--ink-faint); font-weight:600; }

  .section-title{ font-size:13px; font-weight:700; color:var(--ink-soft); margin:18px 0 8px; }
  .gallery{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .gallery img{ width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; border:1px solid var(--line); }

  .log-list{ display:flex; flex-direction:column; gap:6px; max-height:150px; overflow-y:auto; }
  .log-item{
    display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft);
    background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 10px;
  }
  .log-item svg{ width:13px; height:13px; color:var(--water); flex-shrink:0; }

  .icon-btn{
    width:34px; height:34px; border-radius:10px; background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-soft);
  }
  .icon-btn svg{ width:16px; height:16px; }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--leaf-deep); color:#fff; padding:11px 20px; border-radius:999px;
    font-size:13px; font-weight:600; box-shadow:var(--shadow-lg); z-index:80;
    opacity:0; pointer-events:none; transition:.25s ease; display:flex; align-items:center; gap:8px;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  footer.foot{ text-align:center; margin-top:36px; font-size:11.5px; color:var(--ink-faint); }

  @media(prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }
   .site-footer {
    text-align: center;
    padding: 20px;
    margin-top: auto; /* اگر مایلید همیشه پایین صفحه بماند */
    font-size: 0.9rem;
    color: rgba(138,75,42,0.65); /* استفاده از متغیر متنی که در کدها دارید */
}

.site-footer a {
    color: rgba(138,75,42,0.65); /* یا هر رنگ شاخصی مثل گلد یا تال که در متغیرها تعریف کردید */
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s ease;
}

.site-footer a:hover {
    color: rgba(76,124,144,0.55);  /*تغییر رنگ هنگام هاور */
    text-decoration: underline;
    text-decoration: none;
}
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 21c0-6 3-9 7-9-1 6-3 9-7 9Z" fill="#fff" opacity=".9"/><path d="M12 21c0-7-3.5-11-8-11 1.5 7 4 11 8 11Z" fill="#fff"/></svg>
      </div>
      <div>
        <h1>باغچه من</h1>
        <small>ردیاب گیاهان خانگی</small>
      </div>
    </div>
    <button class="btn btn-add" id="openAddBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      گیاه جدید
    </button>
  </header>

  <section class="hero">
    <div class="hero-text">
      <div class="eyebrow"><span class="dot"></span>وضعیت امروز گلخانه</div>
      <div class="hero-num" id="heroNum">۰</div>
      <div class="hero-sub" id="heroSub">گیاه نیاز به آبیاری دارد</div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><b id="statTotal">۰</b><span>کل گیاهان</span></div>
      <div class="hero-stat"><b id="statHealthy">۰</b><span>سرحال</span></div>
      <div class="hero-stat"><b id="statStreak">۰</b><span>روز بدون خشکی</span></div>
    </div>
  </section>

  <div class="filters">
    <div class="chip active" data-filter="all">همه</div>
    <div class="chip" data-filter="needs">نیاز به آب</div>
    <div class="chip" data-filter="today">آبیاری‌شده امروز</div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="جستجوی گیاه...">
    </div>
  </div>

  <div id="gridWrap"></div>

 
</div>

<!-- Add/Edit Overlay -->
<div class="overlay" id="formOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="formTitle">افزودن گیاه جدید</h2>
    <div class="field">
      <label>نام گیاه</label>
      <input type="text" id="fName" placeholder="مثلاً: مونستراى نشیمن">
    </div>
    <div class="field">
      <label>نوع گیاه</label>
      <div class="species-picker" id="speciesPicker"></div>
    </div>
    <div class="field">
      <button type="button" class="btn ai-btn" id="aiSuggestBtn">
        🌿 دریافت پیشنهاد نگهداری
      </button>
      <div id="aiSuggestBox"></div>
    </div>
    <div class="two-col">
      <div class="field">
        <label>فاصله آبیاری (روز)</label>
        <input type="number" id="fInterval" min="1" value="4">
      </div>
      <div class="field">
        <label>نیاز نوری</label>
        <select id="fLight">
          <option value="low">نور کم</option>
          <option value="medium" selected>نور غیرمستقیم</option>
          <option value="high">آفتاب مستقیم</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>یادداشت (اختیاری)</label>
      <textarea id="fNotes" placeholder="نکته‌ای برای نگهداری..."></textarea>
    </div>
    <div class="field">
      <label>عکس رشد</label>
      <div class="photo-row" id="photoRow">
        <label class="photo-add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <input type="file" accept="image/*" id="photoInput" style="display:none">
        </label>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelFormBtn">انصراف</button>
      <button class="btn btn-primary" id="saveFormBtn">ذخیره گیاه</button>
    </div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="overlay" id="detailOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">

<script>
/* ============ Utilities ============ */
const faDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
function faNum(n){ return String(n).replace(/[0-9]/g, d => faDigits[d]); }

// Gregorian -> Jalali conversion (delegated to the verified jalaali-js library)
function toJalali(gy, gm, gd){
  const r = jalaali.toJalaali(gy, gm, gd);
  return [r.jy, r.jm, r.jd];
}
const jMonths = ["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
function formatJalali(date){
  const [jy,jm,jd] = toJalali(date.getFullYear(), date.getMonth()+1, date.getDate());
  return `${faNum(jd)} ${jMonths[jm-1]} ${faNum(jy)}`;
}
function daysBetween(a,b){
  const d1 = new Date(a.getFullYear(),a.getMonth(),a.getDate());
  const d2 = new Date(b.getFullYear(),b.getMonth(),b.getDate());
  return Math.round((d2-d1)/86400000);
}
function relDay(dateIso){
  const d = new Date(dateIso);
  const diff = daysBetween(d, new Date());
  if(diff===0) return 'امروز';
  if(diff===1) return 'دیروز';
  if(diff<0) return formatJalali(d);
  return `${faNum(diff)} روز پیش`;
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ============ Species icon library ============ */
const SPECIES = {
  leafy: { label:'برگ‌پهن', icon: leafyIcon },
  succulent: { label:'ساکولنت', icon: succulentIcon },
  flowering: { label:'گلدار', icon: floweringIcon },
  cactus: { label:'کاکتوس', icon: cactusIcon },
  fern: { label:'سرخس', icon: fernIcon },
};

function potBase(fill){
  return `<path d="M35 78 L40 100 A6 6 0 0 0 46 105 H74 A6 6 0 0 0 80 100 L85 78 Z" fill="${fill}"/>
          <rect x="30" y="70" width="60" height="10" rx="4" fill="${fill}"/>`;
}

function leafyIcon(color, droop){
  const r = droop*10;
  return `
  <g transform="rotate(${r} 57 68)">
    <path d="M57 68 C40 60 34 38 44 20 C54 34 58 52 57 68Z" fill="${color}"/>
    <path d="M57 68 C74 60 80 38 70 20 C60 34 56 52 57 68Z" fill="${color}" opacity="0.85"/>
    <path d="M57 68 C50 50 52 30 57 12 C62 30 64 50 57 68Z" fill="${color}" opacity="0.95"/>
  </g>`;
}
function succulentIcon(color, droop){
  return `
  <g transform="rotate(${droop*4} 57 68)">
    ${[0,1,2,3,4].map(i=>{
      const ang = -60+i*30;
      return `<ellipse cx="57" cy="68" rx="9" ry="22" fill="${color}" opacity="${0.75+i*0.05}" transform="rotate(${ang} 57 68) translate(0 -14)"/>`;
    }).join('')}
    <circle cx="57" cy="60" r="9" fill="${color}"/>
  </g>`;
}
function floweringIcon(color, droop){
  const r = droop*10;
  return `
  <g transform="rotate(${r} 57 68)">
    <path d="M57 68 C46 58 44 40 52 24 C58 40 58 54 57 68Z" fill="${color}"/>
    <path d="M57 68 C68 58 70 40 62 24 C56 40 56 54 57 68Z" fill="${color}" opacity="0.85"/>
    <g transform="translate(57 20)">
      <circle r="4.5" cy="-4" fill="#E7A9C4"/>
      <circle r="4.5" cx="4" fill="#E7A9C4"/>
      <circle r="4.5" cy="4" fill="#E7A9C4"/>
      <circle r="4.5" cx="-4" fill="#E7A9C4"/>
      <circle r="3.2" fill="#D98C3A"/>
    </g>
  </g>`;
}
function cactusIcon(color, droop){
  return `
  <g transform="rotate(${droop*2} 57 68)">
    <rect x="49" y="26" width="16" height="42" rx="8" fill="${color}"/>
    <rect x="32" y="42" width="14" height="10" rx="6" fill="${color}" opacity="0.9"/>
    <rect x="30" y="34" width="9" height="20" rx="4.5" fill="${color}" opacity="0.9"/>
    <rect x="68" y="48" width="14" height="9" rx="4.5" fill="${color}" opacity="0.9"/>
    <rect x="76" y="38" width="8" height="20" rx="4" fill="${color}" opacity="0.9"/>
  </g>`;
}
function fernIcon(color, droop){
  const r = droop*14;
  let fronds='';
  for(let i=0;i<5;i++){
    const ang = -70+i*35;
    fronds += `<path d="M57 68 Q${57+Math.sin(ang*Math.PI/180)*8} 45 ${57+Math.sin(ang*Math.PI/180)*22} ${68-40+Math.abs(i-2)*4}" stroke="${color}" stroke-width="4" fill="none" stroke-linecap="round" transform="rotate(${r*0.4} 57 68)"/>`;
  }
  return `<g>${fronds}</g>`;
}

function statusOf(plant){
  const since = daysBetween(new Date(plant.lastWatered), new Date());
  const ratio = since / plant.intervalDays;
  let key, color, label;
  if(ratio < 0.5){ key='fresh'; color='var(--leaf)'; label='سرحال'; }
  else if(ratio < 0.85){ key='ok'; color='var(--water)'; label='خوب'; }
  else if(ratio < 1.15){ key='thirsty'; color='var(--wilt)'; label='تشنه'; }
  else { key='critical'; color='var(--danger)'; label='بحرانی'; }
  return { since, ratio: Math.min(ratio,1.4), key, color, label };
}

function resolveColor(varColor){
  const map = { 'var(--leaf)':'#6E9257','var(--water)':'#4C7C90','var(--wilt)':'#C4A24B','var(--danger)':'#B5473A' };
  return map[varColor] || '#6E9257';
}

function ringSvg(size, strokeW, ratio, color, plantSpeciesIcon, droop){
  const r = (size/2) - strokeW;
  const c = size/2;
  const circumference = 2*Math.PI*r;
  const progress = Math.max(0, 1 - ratio); // full ring = just watered
  const offset = circumference * (1-progress);
  return `
  <svg viewBox="0 0 ${size} ${size}">
    <circle class="ring-track" cx="${c}" cy="${c}" r="${r}"/>
    <circle class="ring-prog" cx="${c}" cy="${c}" r="${r}"
      stroke="${resolveColor(color)}"
      stroke-dasharray="${circumference}"
      stroke-dashoffset="${offset}"
      transform="rotate(-90 ${c} ${c})"/>
    <g transform="translate(${c-57+ (size/1.9)} ${c-70+(size/1.9)}) scale(${size/150})">
      ${plantSpeciesIcon(resolveColor(color), droop)}
    </g>
  </svg>`;
}

/* ============ State ============ */
const STORE_KEY = 'baghche-man-plants-v1';
let plants = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
let currentFilter = 'all';
let searchTerm = '';
let activeDetailId = null;
let editingId = null;
let pendingPhotos = [];
let selectedSpecies = 'leafy';
let pendingAiCare = null;

function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(plants)); }

/* ============ Rendering ============ */
function render(){
  renderHero();
  renderGrid();
}

function renderHero(){
  const needs = plants.filter(p => statusOf(p).ratio >= 0.85).length;
  const healthy = plants.filter(p => statusOf(p).ratio < 0.5).length;
  document.getElementById('heroNum').innerHTML = `${faNum(needs)}${needs>0?'<span>!</span>':''}`;
  document.getElementById('heroSub').textContent = needs===0 ? 'همه گیاهان سرحال‌اند 🌿' : 'گیاه نیاز به آبیاری دارد';
  document.getElementById('statTotal').textContent = faNum(plants.length);
  document.getElementById('statHealthy').textContent = faNum(healthy);
  let streak = 0;
  if(plants.length){
    streak = Math.min(...plants.map(p => {
      const s = statusOf(p);
      return s.ratio >= 1 ? 0 : Math.round((1-s.ratio) * p.intervalDays);
    }));
  }
  document.getElementById('statStreak').textContent = faNum(Math.max(0,streak));
}

function filteredPlants(){
  return plants.filter(p=>{
    if(searchTerm && !p.name.includes(searchTerm)) return false;
    const s = statusOf(p);
    if(currentFilter==='needs' && s.ratio < 0.85) return false;
    if(currentFilter==='today' && daysBetween(new Date(p.lastWatered), new Date())!==0) return false;
    return true;
  });
}

function renderGrid(){
  const wrap = document.getElementById('gridWrap');
  const list = filteredPlants();
  if(plants.length===0){
    wrap.innerHTML = `<div class="empty">
      <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
        <path d="M35 78 L40 92 A6 6 0 0 0 46 97 H54 A6 6 0 0 0 60 92 L65 78 Z" fill="#B8663B"/>
        <rect x="30" y="72" width="40" height="8" rx="4" fill="#B8663B"/>
        <path d="M50 72 C36 62 32 44 42 28 C52 42 54 58 50 72Z" fill="#6E9257"/>
        <path d="M50 72 C64 62 68 44 58 28 C48 42 46 58 50 72Z" fill="#6E9257" opacity=".85"/>
      </svg>
      <h3>هنوز گیاهی اضافه نکردی</h3>
      <p>اولین گیاه خونه‌ات رو اضافه کن تا شروع کنیم به مراقبت ازش 🌱</p>
      <button class="btn btn-add" onclick="openAdd()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        افزودن اولین گیاه
      </button>
    </div>`;
    return;
  }
  if(list.length===0){
    wrap.innerHTML = `<div class="empty"><h3>چیزی پیدا نشد</h3><p>فیلتر یا عبارت جستجو رو تغییر بده.</p></div>`;
    return;
  }
  list.sort((a,b)=> statusOf(b).ratio - statusOf(a).ratio);
  wrap.innerHTML = `<div class="grid">${list.map(cardHtml).join('')}</div>`;
}

function cardHtml(p){
  const s = statusOf(p);
  const droop = Math.max(0, (s.ratio-0.5)*2);
  const sp = SPECIES[p.species] || SPECIES.leafy;
  const wateredToday = daysBetween(new Date(p.lastWatered), new Date())===0;
  return `
  <div class="card" onclick="openDetail('${p.id}')">
    <div class="badge ${s.key}">${s.label}</div>
    <div class="ring-wrap">${ringSvg(112, 5, s.ratio, s.color, sp.icon, droop)}</div>
    <h3>${escapeHtml(p.name)}</h3>
    <div class="species">${sp.label}</div>
    <div class="meta-row">آخرین آبیاری: ${relDay(p.lastWatered)}</div>
    <button class="btn water-btn" ${wateredToday?'disabled':''} onclick="event.stopPropagation(); waterPlant('${p.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2s6 7 6 11a6 6 0 1 1-12 0c0-4 6-11 6-11Z"/></svg>
      ${wateredToday ? 'امروز آبیاری شد' : 'آبیاری شد'}
    </button>
  </div>`;
}

function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}

/* ============ Actions ============ */
function waterPlant(id){
  const p = plants.find(x=>x.id===id);
  if(!p) return;
  p.lastWatered = new Date().toISOString();
  p.waterLog = p.waterLog || [];
  p.waterLog.unshift(p.lastWatered);
  save();
  render();
  showToast(`${p.name} آبیاری شد 💧`);
  if(activeDetailId===id) renderDetail(id);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---- Filters / search ---- */
document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderGrid();
  });
});
document.getElementById('searchInput').addEventListener('input', e=>{
  searchTerm = e.target.value.trim();
  renderGrid();
});

/* ============ Add / Edit form ============ */
function buildSpeciesPicker(){
  const el = document.getElementById('speciesPicker');
  el.innerHTML = Object.entries(SPECIES).map(([key,sp])=>`
    <div class="species-opt ${key===selectedSpecies?'active':''}" data-species="${key}" title="${sp.label}">
      <svg viewBox="0 0 114 114">${sp.icon('#6E9257',0)}</svg>
    </div>`).join('');
  el.querySelectorAll('.species-opt').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      selectedSpecies = opt.dataset.species;
      el.querySelectorAll('.species-opt').forEach(o=>o.classList.remove('active'));
      opt.classList.add('active');
    });
  });
}

/* ============ AI care suggestions (local database first, Gemini backend as fallback) ============ */
function normalizeFa(str){
  return (str||'')
    .replace(/[\u200c\u200f\u200e]/g,' ')   // ZWNJ / directional marks -> space
    .replace(/ي/g,'ی').replace(/ك/g,'ک')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}

function findInDb(query){
  const q = normalizeFa(query);
  if(!q) return null;
  // exact match first
  for(const p of PLANT_DB){
    if(p.names.some(n=>normalizeFa(n)===q)) return p;
  }
  // partial/contains match (either direction), only for terms of reasonable length
  if(q.length >= 2){
    for(const p of PLANT_DB){
      if(p.names.some(n=>{
        const nn = normalizeFa(n);
        return nn.length>=2 && (nn.includes(q) || q.includes(nn));
      })) return p;
    }
  }
  return null;
}

function requestCareSuggestion(name, boxId){
  const box = document.getElementById(boxId);
  if(!name){ showToast('اول نام گیاه رو وارد کن'); return null; }
  const dbMatch = findInDb(name);
  if(dbMatch){
    box.innerHTML = careHtml(dbMatch);
    return dbMatch;
  }
  box.innerHTML = `<div class="ai-error">این گیاه هنوز توی دیتابیس داخلی نیست. اسم دیگه‌ای امتحان کن (مثلاً اسم فارسی رایج‌تر یا اسم انگلیسی گیاه).</div>`;
  return null;
}

      <input type="file" accept="image/*" id="photoInput" style="display:none">
    </label>`;
  document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);
}
function removePendingPhoto(i){ pendingPhotos.splice(i,1); renderPhotoRow(); }

function resizeImage(file, maxDim=640){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let {width,height} = img;
        if(width>height && width>maxDim){ height*=maxDim/width; width=maxDim; }
        else if(height>maxDim){ width*=maxDim/height; height=maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width=width; canvas.height=height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhotoUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const dataUrl = await resizeImage(file);
  pendingPhotos.push({ date:new Date().toISOString(), dataUrl });
  renderPhotoRow();
}

document.getElementById('saveFormBtn').addEventListener('click', ()=>{
  const name = document.getElementById('fName').value.trim();
  if(!name){ showToast('نام گیاه رو وارد کن'); return; }
  const interval = Math.max(1, parseInt(document.getElementById('fInterval').value)||4);
  const light = document.getElementById('fLight').value;
  const notes = document.getElementById('fNotes').value.trim();

  if(editingId){
    const p = plants.find(x=>x.id===editingId);
    p.name=name; p.intervalDays=interval; p.light=light; p.notes=notes;
    p.species=selectedSpecies; p.photos=pendingPhotos; p.aiCare=pendingAiCare;
  } else {
    plants.push({
      id: uid(), name, species:selectedSpecies, intervalDays:interval, light, notes,
      lastWatered: new Date().toISOString(), createdAt: new Date().toISOString(),
      photos: pendingPhotos, waterLog: [new Date().toISOString()], aiCare: pendingAiCare
    });
  }
  save();
  hideOverlay('formOverlay');
  render();
  showToast(editingId ? 'تغییرات ذخیره شد' : `${name} به باغچه اضافه شد 🌿`);
});

function renderDetail(id){
  const p = plants.find(x=>x.id===id);
  if(!p) return;
  const s = statusOf(p);
  const droop = Math.max(0,(s.ratio-0.5)*2);
  const sp = SPECIES[p.species] || SPECIES.leafy;
  document.getElementById('detailRing').innerHTML = ringSvg(150,6,s.ratio,s.color,sp.icon,droop);
  document.getElementById('detailName').textContent = p.name;
  document.getElementById('detailSpecies').textContent = sp.label + ' · ' + s.label;
  document.getElementById('detailInterval').textContent = `${faNum(p.intervalDays)} روز`;
  document.getElementById('detailSince').textContent = `${faNum(s.since)} روز`;
  document.getElementById('detailCount').textContent = faNum((p.waterLog||[]).length);
  const wateredToday = daysBetween(new Date(p.lastWatered), new Date())===0;
  const wBtn = document.getElementById('detailWaterBtn');
  wBtn.disabled = wateredToday;
  wBtn.innerHTML = (wateredToday
    ? `امروز آبیاری شد ✓`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2s6 7 6 11a6 6 0 1 1-12 0c0-4 6-11 6-11Z"/></svg> آبیاری شد`);

  if(p.notes){
    document.getElementById('detailNotesWrap').style.display='block';
    document.getElementById('detailNotes').textContent = p.notes;
  } else {
    document.getElementById('detailNotesWrap').style.display='none';
  }

  renderDetailAiCare(p);

  const gallery = document.getElementById('detailGallery');
  gallery.innerHTML = (p.photos||[]).map(ph=>`<img src="${ph.dataUrl}" title="${formatJalali(new Date(ph.date))}">`).join('')
    || `<div style="grid-column:1/-1; font-size:12px; color:var(--ink-faint); text-align:center; padding:14px 0;">هنوز عکسی اضافه نشده</div>`;

  const log = document.getElementById('detailLog');

    <div class="log-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2s6 7 6 11a6 6 0 1 1-12 0c0-4 6-11 6-11Z"/></svg>
      ${formatJalali(new Date(d))} — ${relDay(d)}

}

  p.photos = p.photos || [];
  p.photos.unshift({ date:new Date().toISOString(), dataUrl });
  save();
  renderDetail(activeDetailId);
  e.target.value = '';
});

/* ============ Overlay helpers ============ */
function showOverlay(id){ document.getElementById(id).classList.add('show'); document.body.style.overflow='hidden'; }
function hideOverlay(id){ document.getElementById(id).classList.remove('show'); document.body.style.overflow=''; }
document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) hideOverlay(ov.id); });
});
