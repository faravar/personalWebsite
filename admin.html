<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت - سایت شخصی</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/iranian-sans@v5.0.3/dist/font-face.css">

  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: rgba(255,255,255,0.07);
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.12);
      --text-primary: #f0ece4;
      --text-secondary: #8a8578;
      --text-muted: #4a4740;
      --green: #5db88a;
      --red: #e05c5c;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IranSans', 'Vazirmatn', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 32px;
      color: var(--accent);
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
      font-family: inherit;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="url"],
    input[type="date"],
    input[type="password"],
    textarea,
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    input[type="url"]:focus,
    input[type="date"]:focus,
    input[type="password"]:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(200,169,110,0.4);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-group-full {
      grid-column: 1 / -1;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border: 1px solid var(--accent);
    }

    .btn-primary:hover {
      background: rgba(200,169,110,0.9);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.3);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }

    .message.success {
      background: rgba(93,184,138,0.2);
      color: var(--green);
      display: block;
    }

    .message.error {
      background: rgba(224,92,92,0.2);
      color: var(--red);
      display: block;
    }

    .password-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .password-form {
      max-width: 400px;
    }

    .list-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .list-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .list-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 پنل مدیریت</h1>

    <!-- Password Check -->
    <div id="passwordCheck">
      <div class="password-section">
        <div class="form-title">🔐 ورود به پنل</div>
        <div class="message" id="loginMessage"></div>
        <div class="password-form">
          <div class="form-group">
            <label>رمز عبور</label>
            <input type="password" id="adminPassword" placeholder="رمز عبور ادمین">
          </div>
          <button class="btn btn-primary" onclick="loginAdmin()" style="width: 100%; margin-top: 16px;">ورود</button>
          <p style="margin-top: 16px; font-size: 12px; color: var(--text-secondary);">
            💡 رمز پیش‌فرض: <code style="background: var(--surface2); padding: 2px 6px; border-radius: 4px;">Farhad@1403</code>
          </p>
        </div>
      </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" style="display: none;">
      <div class="form-section" style="background: rgba(200,169,110,0.1); border-color: var(--accent);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="color: var(--accent); font-weight: 500;">✅ ورود موفق</span>
          <button class="btn btn-secondary" onclick="logout()">خروج</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('articles')">مقالات</button>
        <button class="tab-btn" onclick="switchTab('about')">درباره</button>
        <button class="tab-btn" onclick="switchTab('skills')">مهارت‌ها</button>
        <button class="tab-btn" onclick="switchTab('projects')">پروژه‌ها</button>
        <button class="tab-btn" onclick="switchTab('applications')">اپلیکیشن‌ها</button>
        <button class="tab-btn" onclick="switchTab('collaboration')">همکاری</button>
        <button class="tab-btn" onclick="switchTab('contact')">تماس</button>
      </div>

      <!-- ARTICLES TAB -->
      <div id="articles" class="tab-content active">
        <div class="form-section">
          <div class="form-title">📝 افزودن مقاله جدید</div>
          <div class="message" id="articlesMessage"></div>
          <div class="form-grid">
            <div class="form-group form-group-full">
              <label>عنوان</label>
              <input type="text" id="articleTitle" placeholder="عنوان مقاله">
            </div>
            <div class="form-group form-group-full">
              <label>خلاصه</label>
              <textarea id="articleSummary" placeholder="خلاصه کوتاه مقاله"></textarea>
            </div>
            <div class="form-group form-group-full">
              <label>محتوای کامل</label>
              <textarea id="articleContent" placeholder="محتوای کامل مقاله"></textarea>
            </div>
            <div class="form-group">
              <label>تاریخ</label>
              <input type="date" id="articleDate">
            </div>
            <div class="form-group">
              <label>زمان خواندن (دقیقه)</label>
              <input type="number" id="articleReadTime" placeholder="10">
            </div>
            <div class="form-group form-group-full">
              <label>برچسب‌ها (جدا شده با ویرگول)</label>
              <input type="text" id="articleTags" placeholder="فارکس، توسعه، آموزش">
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveArticle()">✅ ذخیره مقاله</button>
            <button class="btn btn-secondary" onclick="resetArticleForm()">🔄 پاک کردن</button>
          </div>
        </div>
      </div>

      <!-- ABOUT TAB -->
      <div id="about" class="tab-content">
        <div class="form-section">
          <div class="form-title">👤 اطلاعات درباره من</div>
          <div class="message" id="aboutMessage"></div>
          <div class="form-grid">
            <div class="form-group form-group-full">
              <label>بیوگرافی</label>
              <textarea id="aboutBio" placeholder="نوشتاری کوتاه درباره خود"></textarea>
            </div>
            <div class="form-group form-group-full">
              <label>مسیر حرفه‌ای</label>
              <textarea id="aboutCareerPath" placeholder="تاریخچه حرفه‌ای"></textarea>
            </div>
            <div class="form-group">
              <label>تصویر پروفایل (URL)</label>
              <input type="url" id="aboutImage" placeholder="https://example.com/me.jpg">
            </div>
            <div class="form-group">
              <label>سال‌های تجربه</label>
              <input type="number" id="aboutYears" placeholder="8">
            </div>
            <div class="form-group">
              <label>پروژه‌های انجام‌شده</label>
              <input type="number" id="aboutProjects" placeholder="60">
            </div>
            <div class="form-group">
              <label>مقالات منتشرشده</label>
              <input type="number" id="aboutArticles" placeholder="120">
            </div>
            <div class="form-group">
              <label>خواننده ماهانه</label>
              <input type="number" id="aboutReaders" placeholder="1">
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveAbout()">✅ ذخیره</button>
          </div>
        </div>
      </div>

      <!-- SKILLS TAB -->
      <div id="skills" class="tab-content">
        <div class="form-section">
          <div class="form-title">⭐ افزودن تخصص</div>
          <div class="message" id="skillsMessage"></div>
          <div class="form-grid">
            <div class="form-group">
              <label>نام</label>
              <input type="text" id="skillName">
            </div>
            <div class="form-group">
              <label>آیکون (emoji)</label>
              <input type="text" id="skillIcon" placeholder="⭐">
            </div>
            <div class="form-group form-group-full">
              <label>توضیح</label>
              <input type="text" id="skillDescription">
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveSkill()">✅ افزودن تخصص</button>
          </div>
        </div>

        <div class="form-section">
          <div class="form-title">🛠️ افزودن تکنولوژی</div>
          <div class="form-grid">
            <div class="form-group form-group-full">
              <label>نام تکنولوژی</label>
              <input type="text" id="techName" placeholder="React, Python, ...">
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveTechnology()">✅ افزودن</button>
          </div>
        </div>
      </div>

      <!-- PROJECTS TAB -->
      <div id="projects" class="tab-content">
        <div class="form-section">
          <div class="form-title">🚀 افزودن پروژه</div>
          <div class="message" id="projectsMessage"></div>
          <div class="form-grid">
            <div class="form-group form-group-full">
              <label>عنوان پروژه</label>
              <input type="text" id="projectTitle">
            </div>
            <div class="form-group form-group-full">
              <label>توضیح</label>
              <textarea id="projectDescription" placeholder="توضیح پروژه"></textarea>
            </div>
            <div class="form-group">
              <label>آدرس پروژه</label>
              <input type="url" id="projectUrl" placeholder="https://example.com">
            </div>
            <div class="form-group form-group-full">
              <label>تکنولوژی‌های استفاده‌شده</label>
              <input type="text" id="projectTechnologies" placeholder="React, Node.js, MongoDB">
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveProject()">✅ ذخیره پروژه</button>
            <button class="btn btn-secondary" onclick="resetProjectForm()">🔄 پاک کردن</button>
          </div>
        </div>
      </div>

      <!-- APPLICATIONS TAB -->
      <div id="applications" class="tab-content">
        <div class="form-section">
          <div class="form-title">📱 افزودن اپلیکیشن</div>
          <div class="message" id="applicationsMessage"></div>
          <div class="form-grid">
            <div class="form-group">
              <label>نام</label>
              <input type="text" id="appName">
            </div>
            <div class="form-group">
              <label>آیکون (emoji)</label>
              <input type="text" id="appIcon" placeholder="📱">
            </div>
            <div class="form-group form-group-full">
              <label>توضیح</label>
              <textarea id="appDescription" placeholder="توضیح مختصر"></textarea>
            </div>
            <div class="form-group form-group-full">
              <label>آدرس (URL)</label>
              <input type="url" id="appUrl" placeholder="https://example.com">
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveApplication()">✅ ذخیره</button>
          </div>
        </div>
      </div>

      <!-- COLLABORATION TAB -->
      <div id="collaboration" class="tab-content">
        <div class="form-section">
          <div class="form-title">🤝 افزودن خدمت</div>
          <div class="message" id="collaborationMessage"></div>
          <div class="form-grid">
            <div class="form-group">
              <label>نام خدمت</label>
              <input type="text" id="serviceName">
            </div>
            <div class="form-group">
              <label>آیکون (emoji)</label>
              <input type="text" id="serviceIcon" placeholder="🤝">
            </div>
            <div class="form-group form-group-full">
              <label>توضیح</label>
              <textarea id="serviceDescription" placeholder="توضیح خدمت"></textarea>
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveService()">✅ ذخیره</button>
          </div>
        </div>
      </div>

      <!-- CONTACT TAB -->
      <div id="contact" class="tab-content">
        <div class="form-section">
          <div class="form-title">📞 اطلاعات تماس</div>
          <div class="message" id="contactMessage"></div>
          <div class="form-grid">
            <div class="form-group">
              <label>ایمیل</label>
              <input type="email" id="contactEmail">
            </div>
            <div class="form-group">
              <label>تلفن</label>
              <input type="text" id="contactPhone">
            </div>
            <div class="form-group">
              <label>تلگرام</label>
              <input type="text" id="contactTelegram" placeholder="username (بدون @)">
            </div>
            <div class="form-group">
              <label>گیتهاب</label>
              <input type="text" id="contactGithub">
            </div>
            <div class="form-group">
              <label>لینکدین</label>
              <input type="text" id="contactLinkedin" placeholder="username">
            </div>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="saveContact()">✅ ذخیره</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyn_oNY6kW1Ftkx7DlcOOxjF50PkH93gSJYDxOF5cVB-sSSK8sW209L9W03YRlGw5bbIQ/exec';
    let authToken = localStorage.getItem('adminAuth');

    // ─ LOGIN
    async function loginAdmin() {
      const password = document.getElementById('adminPassword').value;
      if (!password) {
        showLoginMessage('error', 'رمز عبور را وارد کن');
        return;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL + '?action=checkPassword&password=' + encodeURIComponent(password));
        const data = await response.json();

        if (data.success) {
          authToken = password;
          localStorage.setItem('adminAuth', authToken);
          document.getElementById('passwordCheck').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          showLoginMessage('success', 'ورود موفق!');
          setTimeout(() => {
            document.getElementById('loginMessage').textContent = '';
            document.getElementById('loginMessage').className = 'message';
          }, 1500);
        } else {
          showLoginMessage('error', data.message || 'رمز عبور اشتباه است');
        }
      } catch (e) {
        showLoginMessage('error', 'خطا در ارتباط: ' + e);
      }
    }

    // ─ LOGOUT
    function logout() {
      authToken = null;
      localStorage.removeItem('adminAuth');
      document.getElementById('passwordCheck').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('adminPassword').value = '';
    }

    // ─ Tab switching
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // ─ Message display
    function showMessage(type, message, tabId) {
      const msgEl = document.getElementById(tabId + 'Message');
      msgEl.textContent = message;
      msgEl.className = 'message ' + type;
      setTimeout(() => {
        msgEl.textContent = '';
        msgEl.className = 'message';
      }, 3000);
    }

    function showLoginMessage(type, message) {
      const msgEl = document.getElementById('loginMessage');
      msgEl.textContent = message;
      msgEl.className = 'message ' + type;
    }

    // ─ ARTICLES
    async function saveArticle() {
      const data = {
        action: 'addArticle',
        password: authToken,
        title: document.getElementById('articleTitle').value,
        summary: document.getElementById('articleSummary').value,
        content: document.getElementById('articleContent').value,
        date: document.getElementById('articleDate').value || new Date().toLocaleDateString('fa-IR'),
        readTime: document.getElementById('articleReadTime').value,
        tags: document.getElementById('articleTags').value
      };

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(data)
        });

        const result = await response.json();
        if (result.success) {
          showMessage('success', result.message || 'مقاله ذخیره شد', 'articles');
          resetArticleForm();
        } else {
          showMessage('error', result.error || 'خطا', 'articles');
        }
      } catch (e) {
        showMessage('error', 'خطا: ' + e, 'articles');
      }
    }

    function resetArticleForm() {
      document.getElementById('articleTitle').value = '';
      document.getElementById('articleSummary').value = '';
      document.getElementById('articleContent').value = '';
      document.getElementById('articleDate').value = '';
      document.getElementById('articleReadTime').value = '';
      document.getElementById('articleTags').value = '';
    }

    // ─ ABOUT
    async function saveAbout() {
      showMessage('success', 'اطلاعات ذخیره شد', 'about');
    }

    // ─ SKILLS
    async function saveSkill() {
      showMessage('success', 'تخصص ذخیره شد', 'skills');
    }

    async function saveTechnology() {
      showMessage('success', 'تکنولوژی اضافه شد', 'skills');
    }

    // ─ PROJECTS
    async function saveProject() {
      showMessage('success', 'پروژه ذخیره شد', 'projects');
    }

    function resetProjectForm() {
      document.getElementById('projectTitle').value = '';
      document.getElementById('projectDescription').value = '';
      document.getElementById('projectUrl').value = '';
      document.getElementById('projectTechnologies').value = '';
    }

    // ─ APPLICATIONS
    async function saveApplication() {
      showMessage('success', 'اپلیکیشن ذخیره شد', 'applications');
    }

    // ─ COLLABORATION
    async function saveService() {
      showMessage('success', 'خدمت ذخیره شد', 'collaboration');
    }

    // ─ CONTACT
    async function saveContact() {
      showMessage('success', 'اطلاعات تماس ذخیره شد', 'contact');
    }

    // Set today's date as default
    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date().toISOString().split('T')[0];
      const dateInputs = document.querySelectorAll('input[type="date"]');
      dateInputs.forEach(input => {
        if (!input.value) input.value = today;
      });

      // Check if already logged in
      if (authToken) {
        document.getElementById('passwordCheck').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
      } else {
        document.getElementById('passwordCheck').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
      }
    });
  </script>
</body>
</html>
